name: Lint
on: [push, pull_request]
jobs:
  lint:
    uses: open-contracting/.github/.github/workflows/lint.yml@main
    permissions:
      contents: write
    secrets:
      personal-access-token: ${{ secrets.PAT }}
    with:
      standard-maintenance-scripts-files: requirements_base.in
      # Copy of release-schema.json to generate checks.
      ocds-schema-exceptions: release-schema.json
